name: JetKVM
options:
  bundleIdPrefix: com.jetkvm
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    from: "130.0.0"

targets:
  JetKVM:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - JetKVM
    dependencies:
      - package: WebRTC
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: coops.jetkvm
        PRODUCT_NAME: JetKVM
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: F3CB625F85
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: JetKVM/JetKVM.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Client for JetKVM
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "JetKVM needs local network access to discover and connect to KVM devices on your network."
        INFOPLIST_KEY_NSBonjourServices: "_http._tcp"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        TARGETED_DEVICE_FAMILY: "2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        MACOSX_DEPLOYMENT_TARGET: "14.0"
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
